<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="75%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1e0b06"/>
      <stop offset="100%" stop-color="#070202"/>
    </radialGradient>
    <radialGradient id="petals" cx="50" cy="50" r="33" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ff3300" stop-opacity="0.05"/>
      <stop offset="40%"  stop-color="#ff5500" stop-opacity="0.6"/>
      <stop offset="80%"  stop-color="#ff8800" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffcc00" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="35%"  stop-color="#ffe566"/>
      <stop offset="70%"  stop-color="#ff7700" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff3300" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff9900" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff5500" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="23" fill="url(#bg)"/>

  <!-- Subtle inner glow on background -->
  <rect width="100" height="100" rx="23" fill="url(#halo)" opacity="0.5"/>

  <!-- 6 petals — each a pointed teardrop from center to tip -->
  <g filter="url(#glow)">
    <path d="M50,50 C43,42 40,26 50,15 C60,26 57,42 50,50Z" fill="url(#petals)"/>
    <path d="M50,50 C43,42 40,26 50,15 C60,26 57,42 50,50Z" fill="url(#petals)" transform="rotate(60,50,50)"/>
    <path d="M50,50 C43,42 40,26 50,15 C60,26 57,42 50,50Z" fill="url(#petals)" transform="rotate(120,50,50)"/>
    <path d="M50,50 C43,42 40,26 50,15 C60,26 57,42 50,50Z" fill="url(#petals)" transform="rotate(180,50,50)"/>
    <path d="M50,50 C43,42 40,26 50,15 C60,26 57,42 50,50Z" fill="url(#petals)" transform="rotate(240,50,50)"/>
    <path d="M50,50 C43,42 40,26 50,15 C60,26 57,42 50,50Z" fill="url(#petals)" transform="rotate(300,50,50)"/>
  </g>

  <!-- Center soft halo -->
  <circle cx="50" cy="50" r="16" fill="url(#core)" filter="url(#softglow)" opacity="0.7"/>

  <!-- Center bright core -->
  <circle cx="50" cy="50" r="7" fill="url(#core)" filter="url(#glow)"/>

  <!-- Center white dot -->
  <circle cx="50" cy="50" r="3.2" fill="white" opacity="0.95"/>
</svg>
