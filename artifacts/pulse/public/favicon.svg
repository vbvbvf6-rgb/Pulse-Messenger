<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="45%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#e63200"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#e63200" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Rounded background square -->
  <rect x="4" y="4" width="92" height="92" rx="22" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Nova 4-pointed star burst -->
  <path d="M50 14 C50 14 54 41 86 50 C54 59 50 86 50 86 C50 86 46 59 14 50 C46 41 50 14 50 14Z"
    fill="white" opacity="0.92" filter="url(#glow)"/>
  <!-- Shine overlay on star -->
  <path d="M50 14 C50 14 54 41 86 50 C54 59 50 86 50 86 C50 86 46 59 14 50 C46 41 50 14 50 14Z"
    fill="url(#shine)"/>
  <!-- Center highlight -->
  <circle cx="50" cy="50" r="4.5" fill="white" opacity="0.9"/>
</svg>
